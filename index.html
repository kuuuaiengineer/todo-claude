<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoリスト</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #4f46e5;
      --primary-h: #4338ca;
      --danger:    #ef4444;
      --danger-h:  #dc2626;
      --success:   #22c55e;
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ログイン画面 ===== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      max-width: 360px;
      width: 100%;
    }
    .login-card .app-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .login-card p {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-google:hover {
      border-color: var(--primary);
      background: #f8f9ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79,70,229,.15);
    }
    .btn-google:active { transform: scale(.98); }
    .btn-google img { width: 20px; height: 20px; }

    /* ===== ヘッダー ===== */
    header {
      background: var(--primary);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(79,70,229,.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    #user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.5);
      object-fit: cover;
    }
    #user-name {
      font-size: .82rem;
      opacity: .9;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-signout {
      padding: 5px 12px;
      border: 1.5px solid rgba(255,255,255,.5);
      border-radius: 20px;
      background: transparent;
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-signout:hover { background: rgba(255,255,255,.15); }

    /* ===== メインレイアウト ===== */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ===== 追加フォーム ===== */
    .add-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 24px;
    }
    .add-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: var(--primary); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { font-size: .78rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; }
    input[type="text"], input[type="date"], textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; }
    textarea { resize: vertical; min-height: 72px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-danger:hover  { background: var(--danger-h); }
    .btn-ghost   { background: var(--border);  color: var(--text); }
    .btn-ghost:hover   { background: #d1d5db; }
    .form-actions { margin-top: 12px; display: flex; justify-content: flex-end; }

    /* ===== フィルタ & 検索 ===== */
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
    .toolbar input[type="text"] { flex: 1; min-width: 160px; background: var(--surface); }
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      transition: all .15s;
      font-family: inherit;
    }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ===== ToDoカード ===== */
    #todo-list { display: flex; flex-direction: column; gap: 10px; }
    .todo-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      border-left: 4px solid transparent;
    }
    .todo-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.1); }
    .todo-card.done    { border-left-color: var(--success); opacity: .65; }
    .todo-card.overdue { border-left-color: var(--danger); }
    .todo-card.upcoming { border-left-color: #f59e0b; }

    .check-circle {
      width: 22px; height: 22px; min-width: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
      transition: all .15s;
      cursor: pointer;
    }
    .todo-card.done .check-circle { background: var(--success); border-color: var(--success); color: #fff; }
    .check-circle svg { display: none; }
    .todo-card.done .check-circle svg { display: block; }

    .todo-body { flex: 1; min-width: 0; }
    .todo-title { font-size: .95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .todo-card.done .todo-title { text-decoration: line-through; color: var(--muted); }
    .todo-content-preview { font-size: .8rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .todo-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

    .badge { font-size: .72rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .badge-overdue  { background: #fee2e2; color: #b91c1c; }
    .badge-upcoming { background: #fef3c7; color: #92400e; }
    .badge-ok       { background: #dcfce7; color: #166534; }
    .badge-done     { background: #e0e7ff; color: #3730a3; }
    .badge-nodate   { background: var(--border); color: var(--muted); }

    .todo-card-actions { display: flex; gap: 6px; align-items: flex-start; }
    .icon-btn {
      width: 32px; height: 32px;
      border: none; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .15s;
      color: var(--muted);
      background: transparent;
    }
    .icon-btn:hover { background: var(--bg); color: var(--text); }

    /* ===== 空状態 ===== */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state svg { opacity: .3; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ===== ローディング ===== */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      width: 100%; max-width: 480px;
      transform: translateY(16px) scale(.98);
      transition: transform .2s;
      overflow: hidden;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .modal-footer-right { display: flex; gap: 8px; }

    /* ===== FAB ===== */
    .fab {
      display: none;
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none;
      box-shadow: 0 6px 20px rgba(79,70,229,.4);
      font-size: 1.6rem;
      cursor: pointer;
      align-items: center; justify-content: center;
      z-index: 20;
      transition: background .15s, transform .1s;
    }
    .fab:hover { background: var(--primary-h); }
    .fab:active { transform: scale(.93); }

    /* ===== レスポンシブ ===== */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .add-card { display: none; }
      .add-card.mobile-open { display: block; }
      .fab { display: flex; }
      #user-name { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="app-icon">📋</div>
    <h1>ToDoリスト</h1>
    <p>Googleアカウントでログインすると、スマホ・PCどちらからでも同じリストにアクセスできます。</p>
    <button class="btn-google" id="btn-signin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Googleでログイン
    </button>
  </div>
</div>

<!-- ===== アプリ画面 ===== -->
<div id="app-screen" style="display:none">
  <header>
    <div class="header-left">
      <h1>📋 ToDoリスト</h1>
    </div>
    <div class="header-right">
      <div class="user-info">
        <img id="user-avatar" src="" alt="avatar" />
        <span id="user-name"></span>
      </div>
      <button class="btn-signout" id="btn-signout">ログアウト</button>
    </div>
  </header>

  <main>
    <!-- 追加フォーム -->
    <div class="add-card" id="add-card">
      <h2>＋ 新しいやること</h2>
      <div class="form-grid">
        <div class="full">
          <label for="new-title">タイトル <span style="color:var(--danger)">*</span></label>
          <input type="text" id="new-title" placeholder="例：レポートを提出する" />
        </div>
        <div class="full">
          <label for="new-content">内容</label>
          <textarea id="new-content" placeholder="詳細メモを入力…"></textarea>
        </div>
        <div>
          <label for="new-due">期日</label>
          <input type="date" id="new-due" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btn-add">追加する</button>
      </div>
    </div>

    <!-- フィルタ & 検索 -->
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="🔍 検索…" />
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="todo">未完了</button>
        <button class="filter-btn" data-filter="done">完了済</button>
      </div>
    </div>

    <!-- ToDo一覧 -->
    <div id="todo-list">
      <div class="loading"><div class="spinner"></div><p>読み込み中…</p></div>
    </div>
  </main>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn">＋</button>

<!-- ===== 編集モーダル ===== -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>やることを編集</h3>
      <button class="icon-btn" id="modal-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id" />
      <div>
        <label for="edit-title">タイトル <span style="color:var(--danger)">*</span></label>
        <input type="text" id="edit-title" placeholder="タイトルを入力" />
      </div>
      <div>
        <label for="edit-content">内容</label>
        <textarea id="edit-content" placeholder="詳細メモを入力…" style="min-height:100px"></textarea>
      </div>
      <div>
        <label for="edit-due">期日</label>
        <input type="date" id="edit-due" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-delete">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        削除
      </button>
      <div class="modal-footer-right">
        <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
        <button class="btn btn-primary" id="btn-save">保存する</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== Firebase 初期化 =====
const firebaseConfig = {
  apiKey:            "AIzaSyAqkfIoihcpcf7sLhsokeCkwWPSxzVlXKU",
  authDomain:        "my-todo-app-4d92b.firebaseapp.com",
  projectId:         "my-todo-app-4d92b",
  storageBucket:     "my-todo-app-4d92b.firebasestorage.app",
  messagingSenderId: "874365273982",
  appId:             "1:874365273982:web:74956476aa03d571cf152f"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ===== 状態 =====
let currentUser  = null;
let todos        = [];
let unsubscribe  = null;
let currentFilter = 'all';

// ===== 認証 =====
document.getElementById('btn-signin').addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (e) {
    alert('ログインに失敗しました。もう一度お試しください。');
    console.error(e);
  }
});

document.getElementById('btn-signout').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('app-screen').style.display    = 'block';
    document.getElementById('user-name').textContent       = user.displayName || '';
    document.getElementById('user-avatar').src             = user.photoURL    || '';
    subscribeToTodos(user.uid);
  } else {
    if (unsubscribe) unsubscribe();
    todos = [];
    document.getElementById('login-screen').style.display  = 'flex';
    document.getElementById('app-screen').style.display    = 'none';
  }
});

// ===== Firestore リアルタイム購読 =====
function subscribeToTodos(uid) {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db, 'todos'), where('userId', '==', uid));
  unsubscribe = onSnapshot(q, snapshot => {
    todos = snapshot.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => {
        const ta = a.createdAt?.seconds ?? 0;
        const tb = b.createdAt?.seconds ?? 0;
        return tb - ta;
      });
    renderList();
    updateStats();
  }, err => {
    console.error(err);
  });
}

// ===== 追加 =====
document.getElementById('btn-add').addEventListener('click', addTodo);
document.getElementById('new-title').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

async function addTodo() {
  const title   = document.getElementById('new-title').value.trim();
  const content = document.getElementById('new-content').value.trim();
  const due     = document.getElementById('new-due').value;

  if (!title) {
    const el = document.getElementById('new-title');
    el.focus();
    el.style.borderColor = 'var(--danger)';
    setTimeout(() => el.style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = '追加中…';

  try {
    await addDoc(collection(db, 'todos'), {
      userId: currentUser.uid,
      title, content, due,
      done: false,
      createdAt: serverTimestamp()
    });
    document.getElementById('new-title').value   = '';
    document.getElementById('new-content').value = '';
    document.getElementById('new-due').value     = '';
    if (window.innerWidth <= 600) {
      document.getElementById('add-card').classList.remove('mobile-open');
    }
  } catch (e) {
    alert('追加に失敗しました。');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '追加する';
  }
}

// ===== 完了トグル =====
async function toggleDone(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  try {
    await updateDoc(doc(db, 'todos', id), { done: !t.done });
  } catch (e) { console.error(e); }
}

// ===== 編集モーダル =====
function openEditModal(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  document.getElementById('edit-id').value      = t.id;
  document.getElementById('edit-title').value   = t.title;
  document.getElementById('edit-content').value = t.content || '';
  document.getElementById('edit-due').value     = t.due    || '';
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

document.getElementById('modal-close-btn').addEventListener('click', closeEditModal);
document.getElementById('btn-cancel').addEventListener('click', closeEditModal);
document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-modal')) closeEditModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditModal(); });

// ===== 保存 =====
document.getElementById('btn-save').addEventListener('click', async () => {
  const id      = document.getElementById('edit-id').value;
  const title   = document.getElementById('edit-title').value.trim();
  const content = document.getElementById('edit-content').value.trim();
  const due     = document.getElementById('edit-due').value;

  if (!title) {
    const el = document.getElementById('edit-title');
    el.focus();
    el.style.borderColor = 'var(--danger)';
    setTimeout(() => el.style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '保存中…';

  try {
    await updateDoc(doc(db, 'todos', id), { title, content, due });
    closeEditModal();
  } catch (e) {
    alert('保存に失敗しました。');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '保存する';
  }
});

// ===== 削除 =====
document.getElementById('btn-delete').addEventListener('click', async () => {
  const id = document.getElementById('edit-id').value;
  if (!confirm('このタスクを削除しますか？')) return;
  try {
    await deleteDoc(doc(db, 'todos', id));
    closeEditModal();
  } catch (e) {
    alert('削除に失敗しました。');
    console.error(e);
  }
});

// ===== フィルタ =====
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {

    renderList();

// ===== 期日バッジ =====
function dueBadge(due, done) {
  if (done) return '<span class="badge badge-done">完了</span>';
  if (!due)  return '<span class="badge badge-nodate">期日なし</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const d    = new Date(due + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)   return `<span class="badge badge-overdue">期限切れ</span>`;
  if (diff === 0) return `<span class="badge badge-upcoming">今日まで</span>`;
  if (diff <= 3)  return `<span class="badge badge-upcoming">あと${diff}日</span>`;
  return `<span class="badge badge-ok">${due.replace(/-/g,'/')}</span>`;
}

function cardClass(t) {
  if (t.done) return 'done';
  if (!t.due) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(t.due + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 3) return 'upcoming';
  return '';
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== レンダリング =====
function renderList() {
  const query = document.getElementById('search-input')?.value.toLowerCase() || '';
  const list  = todos.filter(t => {
    if (currentFilter === 'todo' && t.done)  return false;
    if (currentFilter === 'done' && !t.done) return false;
    if (query && !t.title.toLowerCase().includes(query) && !(t.content||'').toLowerCase().includes(query)) return false;
    return true;
  });

  const container = document.getElementById('todo-list');

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="9" y1="9" x2="15" y2="9"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="12" y2="17"/>
        </svg>
        <p>${todos.length === 0 ? 'やることを追加してみましょう！' : '該当するタスクがありません'}</p>
      </div>`;
    return;
  }

  container.innerHTML = list.map(t => `
    <div class="todo-card ${cardClass(t)}" data-id="${t.id}">
      <div class="check-circle" data-check="${t.id}" title="${t.done ? '未完了に戻す' : '完了にする'}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="todo-body">
        <div class="todo-title">${escHtml(t.title)}</div>
        ${t.content ? `<div class="todo-content-preview">${escHtml(t.content)}</div>` : ''}
        <div class="todo-meta">${dueBadge(t.due, t.done)}</div>
      </div>
      <div class="todo-card-actions">
        <button class="icon-btn" data-edit="${t.id}" title="編集">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');

  // イベント委譲でクリック処理
  container.querySelectorAll('.todo-card').forEach(card => {
    card.addEventListener('click', () => openEditModal(card.dataset.id));
  });
  container.querySelectorAll('[data-check]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); toggleDone(el.dataset.check); });
  });
  container.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openEditModal(el.dataset.edit); });
  });
}
