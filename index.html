<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スタディToDo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-h: #4338ca;
      --danger: #ef4444; --danger-h: #dc2626;
      --success: #22c55e; --required: #f59e0b;
      --bg: #f1f5f9; --surface: #ffffff;
      --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
      --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    body { font-family: 'Segoe UI','Hiragino Sans','Yu Gothic',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ログイン */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:20px; }
    .login-card { background:#fff; border-radius:20px; padding:48px 40px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.2); max-width:360px; width:100%; }
    .login-card .app-icon { font-size:3rem; margin-bottom:12px; }
    .login-card h1 { font-size:1.5rem; font-weight:700; margin-bottom:8px; }
    .login-card p { font-size:.9rem; color:var(--muted); margin-bottom:32px; line-height:1.6; }
    .btn-google { display:flex; align-items:center; justify-content:center; gap:12px; width:100%; padding:12px 20px; border:2px solid var(--border); border-radius:10px; background:#fff; font-size:.95rem; font-weight:600; color:var(--text); cursor:pointer; transition:all .15s; }
    .btn-google:hover { border-color:var(--primary); background:#f8f9ff; transform:translateY(-1px); }
    .btn-google img { width:20px; height:20px; }

    /* ヘッダー */
    header { background:var(--primary); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; box-shadow:0 2px 8px rgba(79,70,229,.3); }
    header h1 { font-size:1.1rem; font-weight:700; }
    .header-right { display:flex; align-items:center; gap:8px; }
    #user-avatar { width:30px; height:30px; border-radius:50%; border:2px solid rgba(255,255,255,.5); }
    .btn-signout { padding:5px 10px; border:1.5px solid rgba(255,255,255,.5); border-radius:20px; background:transparent; color:#fff; font-size:.75rem; font-weight:600; cursor:pointer; }
    .btn-signout:hover { background:rgba(255,255,255,.15); }

    /* メイン */
    main { max-width:600px; margin:0 auto; padding:16px 12px 100px; }

    /* 追加フォーム */
    .add-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:20px; }
    .add-card h2 { font-size:.95rem; font-weight:700; margin-bottom:12px; color:var(--primary); }
    .form-field { margin-bottom:10px; }
    label { font-size:.75rem; font-weight:600; color:var(--muted); display:block; margin-bottom:3px; }
    input[type="text"], input[type="number"], select, textarea {
      width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px;
      font-size:.9rem; font-family:inherit; color:var(--text); background:var(--bg); transition:border-color .15s; -webkit-appearance:none;
    }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary); background:#fff; }
    textarea { resize:vertical; min-height:64px; }
    .form-row { display:flex; gap:8px; }
    .form-row .form-field { flex:1; }

    .type-toggle { display:flex; gap:6px; }
    .type-btn { flex:1; padding:9px 6px; border-radius:8px; border:2px solid var(--border); background:var(--bg); font-size:.82rem; font-weight:700; cursor:pointer; color:var(--muted); transition:all .15s; font-family:inherit; }
    .type-btn.active[data-type="required"] { background:#fef3c7; border-color:var(--required); color:#92400e; }
    .type-btn.active[data-type="optional"] { background:#e0e7ff; border-color:var(--primary); color:#3730a3; }

    .timer-row { display:flex; align-items:center; gap:8px; }
    .timer-row input { width:72px; flex:none; }
    .timer-row span { font-size:.82rem; color:var(--muted); }

    #new-subject-input-wrap { margin-top:6px; display:none; align-items:center; gap:6px; }
    #new-subject-input-wrap.show { display:flex; }
    .btn-sm { padding:7px 11px; font-size:.82rem; border:none; border-radius:7px; cursor:pointer; font-weight:600; font-family:inherit; white-space:nowrap; }
    .btn-sm-primary { background:var(--primary); color:#fff; }
    .btn-sm-ghost { background:var(--border); color:var(--text); }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 18px; border:none; border-radius:8px; font-size:.9rem; font-weight:700; cursor:pointer; transition:background .15s,transform .1s; font-family:inherit; }
    .btn:active { transform:scale(.97); }
    .btn-primary { background:var(--primary); color:#fff; width:100%; margin-top:4px; }
    .btn-primary:hover { background:var(--primary-h); }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-danger:hover { background:var(--danger-h); }
    .btn-ghost { background:var(--border); color:var(--text); }
    .btn-ghost:hover { background:#d1d5db; }

    /* 検索 */
    .search-bar { margin-bottom:16px; }
    .search-bar input { background:var(--surface); }

    /* グループ表示 */
    .type-section { margin-bottom:20px; }
    .type-header { font-size:.8rem; font-weight:700; padding:4px 12px; border-radius:20px; display:inline-block; margin-bottom:10px; }
    .type-header.required { background:#fef3c7; color:#92400e; }
    .type-header.optional { background:#e0e7ff; color:#3730a3; }
    .subject-group { margin-bottom:10px; }
    .subject-label { font-size:.75rem; font-weight:700; color:var(--muted); margin-bottom:6px; padding-left:2px; display:flex; align-items:center; gap:6px; }
    .subject-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* カード */
    .todo-card { background:var(--surface); border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.06); padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; border-left:4px solid transparent; transition:transform .15s,box-shadow .15s; }
    .todo-card:active { transform:scale(.99); }
    .todo-card.done { border-left-color:var(--success); opacity:.6; }
    .todo-card.req-active { border-left-color:var(--required); }
    .check-circle { width:26px; height:26px; min-width:26px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .15s; cursor:pointer; }
    .todo-card.done .check-circle { background:var(--success); border-color:var(--success); color:#fff; }
    .check-circle svg { display:none; }
    .todo-card.done .check-circle svg { display:block; }
    .todo-body { flex:1; min-width:0; }
    .todo-title { font-size:.92rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .todo-card.done .todo-title { text-decoration:line-through; color:var(--muted); }
    .todo-stats { display:flex; align-items:center; gap:8px; margin-top:4px; }
    .streak-badge { font-size:.72rem; font-weight:700; color:#92400e; background:#fef3c7; padding:2px 7px; border-radius:20px; }
    .last-badge { font-size:.72rem; color:var(--muted); }
    .todo-actions { display:flex; gap:4px; }
    .icon-btn { width:34px; height:34px; border:none; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s; color:var(--muted); background:transparent; }
    .icon-btn:hover { background:var(--bg); }
    .play-btn { color:var(--primary); background:#e0e7ff; }
    .play-btn:hover { background:#c7d2fe; }

    /* 空・ローディング */
    .empty-state { text-align:center; padding:48px 20px; color:var(--muted); font-size:.9rem; }
    .loading { text-align:center; padding:60px 20px; color:var(--muted); }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 10px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* モーダル（ボトムシート） */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--surface); border-radius:20px 20px 0 0; box-shadow:0 -8px 32px rgba(0,0,0,.15); width:100%; max-width:600px; transform:translateY(24px); transition:transform .25s; max-height:90vh; overflow-y:auto; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
    .modal-header { padding:14px 18px 10px; display:flex; align-items:center; justify-content:space-between; }
    .modal-header h3 { font-size:.95rem; font-weight:700; }
    .modal-body { padding:0 18px 18px; display:flex; flex-direction:column; gap:12px; }
    .modal-footer { padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; gap:8px; }
    .modal-footer-right { display:flex; gap:8px; }

    /* タイマーフルスクリーン */
    #timer-screen { position:fixed; inset:0; background:linear-gradient(160deg,#1e1b4b 0%,#312e81 100%); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; padding:32px 24px; }
    #timer-screen.hidden { display:none; }
    .timer-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,.15); border:none; width:42px; height:42px; border-radius:50%; color:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .timer-close:hover { background:rgba(255,255,255,.25); }
    .timer-subject-tag { font-size:.82rem; font-weight:600; color:rgba(255,255,255,.65); background:rgba(255,255,255,.12); padding:4px 14px; border-radius:20px; margin-bottom:8px; }
    .timer-task-label { font-size:1.25rem; font-weight:700; margin-bottom:44px; text-align:center; }
    .timer-circle-wrap { position:relative; width:220px; height:220px; margin-bottom:40px; }
    .timer-circle-wrap svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
    .c-bg { fill:none; stroke:rgba(255,255,255,.1); stroke-width:10; }
    .c-fill { fill:none; stroke:#818cf8; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset .6s linear; stroke-dasharray:628; stroke-dashoffset:0; }
    .timer-digits { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:3.6rem; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
    .timer-btn-row { display:flex; gap:14px; }
    .t-btn { padding:14px 36px; border-radius:50px; border:none; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .1s; }
    .t-btn:active { transform:scale(.95); }
    .t-stop { background:rgba(255,255,255,.15); color:#fff; }
    .t-stop:hover { background:rgba(255,255,255,.25); }
    .timer-done-screen { text-align:center; }
    .done-icon { font-size:4rem; margin-bottom:16px; }
    .done-title { font-size:1.4rem; font-weight:700; margin-bottom:8px; }
    .done-sub { font-size:.9rem; color:rgba(255,255,255,.7); margin-bottom:32px; }
    .t-back { background:rgba(255,255,255,.15); color:#fff; }

    /* FAB */
    .fab { display:none; position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:var(--primary); color:#fff; border:none; box-shadow:0 6px 20px rgba(79,70,229,.4); font-size:1.6rem; cursor:pointer; align-items:center; justify-content:center; z-index:20; transition:background .15s,transform .1s; }
    .fab:hover { background:var(--primary-h); }
    .fab:active { transform:scale(.93); }

    @media (max-width:600px) {
      .add-card { display:none; }
      .add-card.mobile-open { display:block; }
      .fab { display:flex; }
    }
  </style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-card">
    <div class="app-icon">📚</div>
    <h1>スタディToDo</h1>
    <p>Googleアカウントでログインして、どこからでも学習管理できます。</p>
    <button class="btn-google" id="btn-signin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Googleでログイン
    </button>
  </div>
</div>

<!-- アプリ -->
<div id="app-screen" style="display:none">
  <header>
    <h1>📚 スタディToDo</h1>
    <div class="header-right">
      <img id="user-avatar" src="" alt="" />
      <button class="btn-signout" id="btn-signout">ログアウト</button>
    </div>
  </header>

  <main>
    <div class="add-card" id="add-card">
      <h2>＋ タスクを追加</h2>
      <div class="form-field">
        <label>タイトル *</label>
        <input type="text" id="new-title" placeholder="例：英単語 Unit5" />
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>科目</label>
          <select id="new-subject">
            <option value="">科目なし</option>
            <option value="__new__">＋ 新しい科目を追加</option>
          </select>
          <div id="new-subject-input-wrap">
            <input type="text" id="new-subject-name" placeholder="科目名" />
            <button class="btn-sm btn-sm-primary" id="btn-create-subject">追加</button>
            <button class="btn-sm btn-sm-ghost" id="btn-cancel-subject">✕</button>
          </div>
        </div>
        <div class="form-field">
          <label>タイプ</label>
          <div class="type-toggle" id="add-type-toggle">
            <button class="type-btn active" data-type="required">必修</button>
            <button class="type-btn" data-type="optional">追加</button>
          </div>
        </div>
      </div>
      <div class="form-field">
        <label>タイマー</label>
        <div class="timer-row">
          <input type="number" id="new-timer" min="1" max="120" value="25" />
          <span>分（デフォルト。タスクごとに変更可）</span>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-add">追加する</button>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 タスクを検索…" />
    </div>

    <div id="todo-list">
      <div class="loading"><div class="spinner"></div><p>読み込み中…</p></div>
    </div>
  </main>
</div>

<button class="fab" id="fab-btn">＋</button>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>タスクを編集</h3>
      <button class="icon-btn" id="modal-close-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id" />
      <div class="form-field">
        <label>タイトル *</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="form-field">
        <label>メモ</label>
        <textarea id="edit-content" placeholder="メモを入力…" style="min-height:80px"></textarea>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>科目</label>
          <select id="edit-subject"><option value="">科目なし</option></select>
        </div>
        <div class="form-field">
          <label>タイプ</label>
          <div class="type-toggle" id="edit-type-toggle">
            <button class="type-btn" data-type="required">必修</button>
            <button class="type-btn" data-type="optional">追加</button>
          </div>
        </div>
      </div>
      <div class="form-field">
        <label>タイマー（分）</label>
        <input type="number" id="edit-timer" min="1" max="120" value="25" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-delete">削除</button>
      <div class="modal-footer-right">
        <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
        <button class="btn btn-primary" style="width:auto" id="btn-save">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- タイマーフルスクリーン -->
<div id="timer-screen" class="hidden">
  <button class="timer-close" id="timer-close">✕</button>

  <div id="timer-counting">
    <div id="timer-subject-tag" class="timer-subject-tag"></div>
    <div id="timer-task-label" class="timer-task-label"></div>
    <div class="timer-circle-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="c-bg" cx="110" cy="110" r="100"/>
        <circle class="c-fill" id="c-fill" cx="110" cy="110" r="100"/>
      </svg>
      <div class="timer-digits" id="timer-digits">25:00</div>
    </div>
    <div class="timer-btn-row">
      <button class="t-btn t-stop" id="timer-stop">やめる</button>
    </div>
  </div>

  <div id="timer-done" class="timer-done-screen" style="display:none">
    <div class="done-icon">🎉</div>
    <div class="done-title">お疲れさま！</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="t-btn t-back" id="timer-back">閉じる</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
         query, where, onSnapshot, serverTimestamp, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqkfIoihcpcf7sLhsokeCkwWPSxzVlXKU",
  authDomain: "my-todo-app-4d92b.firebaseapp.com",
  projectId: "my-todo-app-4d92b",
  storageBucket: "my-todo-app-4d92b.firebasestorage.app",
  messagingSenderId: "874365273982",
  appId: "1:874365273982:web:74956476aa03d571cf152f"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null;
let todos = [], subjects = [];
let unsubTodos = null;
let newType = 'required', editType = 'required';
let timerInterval = null, timerTaskId = null;

const today = () => new Date().toISOString().split('T')[0];

// ===== 認証 =====
document.getElementById('btn-signin').addEventListener('click', async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch { alert('ログインに失敗しました。'); }
});
document.getElementById('btn-signout').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'block';
    document.getElementById('user-avatar').src = user.photoURL || '';
    loadSubjects(user.uid);
    subscribeTodos(user.uid);
  } else {
    if (unsubTodos) unsubTodos();
    todos = []; subjects = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display   = 'none';
  }
});

// ===== 科目（localStorage） =====
function subjectsKey(uid) { return `subjects_${uid}`; }

function loadSubjects(uid) {
  try {
    subjects = JSON.parse(localStorage.getItem(subjectsKey(uid)) || '[]');
  } catch { subjects = []; }
  refreshSubjectSelects();
}

function saveSubjects() {
  localStorage.setItem(subjectsKey(currentUser.uid), JSON.stringify(subjects));
}

function refreshSubjectSelects() {
  const opts = subjects.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  const addSel = document.getElementById('new-subject');
  const prev   = addSel.value;
  addSel.innerHTML = `<option value="">科目なし</option>${opts}<option value="__new__">＋ 新しい科目を追加</option>`;
  if (subjects.find(s => s.id === prev)) addSel.value = prev;

  const editSel = document.getElementById('edit-subject');
  const eprev   = editSel.value;
  editSel.innerHTML = `<option value="">科目なし</option>${opts}`;
  if (eprev) editSel.value = eprev;
}

document.getElementById('new-subject').addEventListener('change', function () {
  const wrap = document.getElementById('new-subject-input-wrap');
  if (this.value === '__new__') { wrap.classList.add('show'); document.getElementById('new-subject-name').focus(); }
  else wrap.classList.remove('show');
});
document.getElementById('btn-create-subject').addEventListener('click', createSubject);
document.getElementById('new-subject-name').addEventListener('keydown', e => { if (e.key === 'Enter') createSubject(); });
document.getElementById('btn-cancel-subject').addEventListener('click', () => {
  document.getElementById('new-subject-input-wrap').classList.remove('show');
  document.getElementById('new-subject').value = '';
});

function createSubject() {
  const name = document.getElementById('new-subject-name').value.trim();
  if (!name) return;
  const id = Date.now().toString();
  subjects.push({ id, name });
  saveSubjects();
  refreshSubjectSelects();
  document.getElementById('new-subject-name').value = '';
  document.getElementById('new-subject-input-wrap').classList.remove('show');
  document.getElementById('new-subject').value = id;
}

// ===== ToDo購読 =====
function subscribeTodos(uid) {
  if (unsubTodos) unsubTodos();
  unsubTodos = onSnapshot(
    query(collection(db, 'todos'), where('userId', '==', uid)),
    snap => {
      todos = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));
      renderList();
    },
    err => {
      console.error(err);
      document.getElementById('todo-list').innerHTML =
        `<div class="empty-state" style="color:var(--danger)">エラー: ${err.code}<br>${err.message}</div>`;
    }
  );
}

// ===== タイプトグル =====
document.querySelectorAll('#add-type-toggle .type-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#add-type-toggle .type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    newType = btn.dataset.type;
  })
);
document.querySelectorAll('#edit-type-toggle .type-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#edit-type-toggle .type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    editType = btn.dataset.type;
  })
);

// ===== 追加 =====
document.getElementById('btn-add').addEventListener('click', addTodo);
document.getElementById('new-title').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

async function addTodo() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) {
    const el = document.getElementById('new-title');
    el.focus(); el.style.borderColor = 'var(--danger)';
    setTimeout(() => (el.style.borderColor = ''), 1500);
    return;
  }
  const subVal = document.getElementById('new-subject').value;
  const subjectId = (subVal && subVal !== '__new__') ? subVal : '';
  const timerMin  = parseInt(document.getElementById('new-timer').value) || 25;
  localStorage.setItem('defaultTimer', timerMin);

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  try {
    await addDoc(collection(db, 'todos'), {
      userId: currentUser.uid, title,
      content: '', subjectId, type: newType,
      timerMinutes: timerMin, completedDates: [], done: false,
      createdAt: serverTimestamp()
    });
    document.getElementById('new-title').value = '';
    if (window.innerWidth <= 600) document.getElementById('add-card').classList.remove('mobile-open');
  } catch { alert('追加に失敗しました。'); }
  finally { btn.disabled = false; }
}

// ===== 完了トグル =====
async function toggleDone(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  const td = today();
  const isDone = isDoneToday(t);
  try {
    await updateDoc(doc(db, 'todos', id), {
      completedDates: isDone ? arrayRemove(td) : arrayUnion(td),
      done: !isDone
    });
  } catch (e) { console.error(e); }
}

function isDoneToday(t) {
  if (Array.isArray(t.completedDates)) return t.completedDates.includes(today());
  return !!t.done;
}

// ===== 連続日数 =====
function calcStreak(dates) {
  if (!dates || dates.length === 0) return 0;
  const set = new Set(dates);
  const now = new Date(); now.setHours(0,0,0,0);
  const todayStr = now.toISOString().split('T')[0];
  const start = set.has(todayStr) ? now : new Date(now.getTime() - 86400000);
  let streak = 0, cur = new Date(start);
  for (let i = 0; i < 365; i++) {
    if (set.has(cur.toISOString().split('T')[0])) { streak++; cur.setDate(cur.getDate() - 1); }
    else break;
  }
  return streak;
}

// ===== 最終学習日 =====
function lastStudyText(dates) {
  if (!dates || dates.length === 0) return '未学習';
  const last = [...dates].sort().at(-1);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((now - new Date(last + 'T00:00:00')) / 86400000);
  if (diff === 0) return '今日';
  if (diff === 1) return '昨日';
  if (diff < 7)  return `${diff}日前`;
  if (diff < 30) return `${Math.floor(diff/7)}週間前`;
  return `${Math.floor(diff/30)}ヶ月前`;
}

// ===== レンダリング =====
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function subjectName(id) { return id ? (subjects.find(s => s.id === id)?.name || '不明') : ''; }

function renderList() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const list = todos.filter(t => !q || t.title.toLowerCase().includes(q));
  const container = document.getElementById('todo-list');

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state">${todos.length === 0 ? 'タスクを追加してみましょう！' : '該当するタスクがありません'}</div>`;
    return;
  }

  const required = list.filter(t => (t.type || 'optional') === 'required');
  const optional  = list.filter(t => (t.type || 'optional') !== 'required');
  let html = '';

  if (required.length) html += `<div class="type-section"><div class="type-header required">🔥 必修</div>${renderGroup(required)}</div>`;
  if (optional.length)  html += `<div class="type-section"><div class="type-header optional">📝 追加</div>${renderGroup(optional)}</div>`;

  container.innerHTML = html;

  container.querySelectorAll('[data-check]').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); toggleDone(el.dataset.check); })
  );
  container.querySelectorAll('[data-edit]').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); openEditModal(el.dataset.edit); })
  );
  container.querySelectorAll('[data-play]').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); startTimer(el.dataset.play); })
  );
}

function renderGroup(list) {
  const groups = {};
  list.forEach(t => { const k = t.subjectId || '__'; if (!groups[k]) groups[k] = []; groups[k].push(t); });
  const keys = [
    ...subjects.filter(s => groups[s.id]).map(s => s.id),
    ...(groups['__'] ? ['__'] : [])
  ];
  const multiGroup = keys.length > 1 || (keys[0] && keys[0] !== '__');
  return keys.map(k => {
    const label = k === '__' ? '科目なし' : subjectName(k);
    return `<div class="subject-group">
      ${multiGroup || k !== '__' ? `<div class="subject-label">${esc(label)}</div>` : ''}
      ${groups[k].map(renderCard).join('')}
    </div>`;
  }).join('');
}

function renderCard(t) {
  const done      = isDoneToday(t);
  const isReq     = (t.type || 'optional') === 'required';
  const cardClass = done ? 'done' : (isReq ? 'req-active' : '');
  const streak    = calcStreak(t.completedDates || []);

  let statsHtml;
  if (isReq) {
    statsHtml = streak > 0
      ? `<span class="streak-badge">🔥 ${streak}日連続</span>`
      : `<span class="last-badge">今日から始めよう</span>`;
  } else {
    statsHtml = `<span class="last-badge">最終：${lastStudyText(t.completedDates || [])}</span>`;
  }

  return `<div class="todo-card ${cardClass}">
    <div class="check-circle" data-check="${t.id}">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="todo-body">
      <div class="todo-title">${esc(t.title)}</div>
      <div class="todo-stats">${statsHtml}</div>
    </div>
    <div class="todo-actions">
      <button class="icon-btn play-btn" data-play="${t.id}" title="タイマー開始">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="icon-btn" data-edit="${t.id}" title="編集">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </div>`;
}

// ===== 編集モーダル =====
function openEditModal(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  document.getElementById('edit-id').value      = t.id;
  document.getElementById('edit-title').value   = t.title;
  document.getElementById('edit-content').value = t.content || '';
  document.getElementById('edit-timer').value   = t.timerMinutes || 25;
  refreshSubjectSelects();
  setTimeout(() => { document.getElementById('edit-subject').value = t.subjectId || ''; }, 50);
  editType = t.type || 'optional';
  document.querySelectorAll('#edit-type-toggle .type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === editType));
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

document.getElementById('modal-close-btn').addEventListener('click', closeEditModal);
document.getElementById('btn-cancel').addEventListener('click', closeEditModal);
document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === document.getElementById('edit-modal')) closeEditModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditModal(); });

document.getElementById('btn-save').addEventListener('click', async () => {
  const id    = document.getElementById('edit-id').value;
  const title = document.getElementById('edit-title').value.trim();
  if (!title) {
    const el = document.getElementById('edit-title');
    el.focus(); el.style.borderColor = 'var(--danger)';
    setTimeout(() => (el.style.borderColor = ''), 1500);
    return;
  }
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  try {
    await updateDoc(doc(db, 'todos', id), {
      title,
      content:      document.getElementById('edit-content').value.trim(),
      subjectId:    document.getElementById('edit-subject').value || '',
      type:         editType,
      timerMinutes: parseInt(document.getElementById('edit-timer').value) || 25
    });
    closeEditModal();
  } catch { alert('保存に失敗しました。'); }
  finally { btn.disabled = false; }
});

document.getElementById('btn-delete').addEventListener('click', async () => {
  const id = document.getElementById('edit-id').value;
  if (!confirm('このタスクを削除しますか？')) return;
  try { await deleteDoc(doc(db, 'todos', id)); closeEditModal(); }
  catch { alert('削除に失敗しました。'); }
});

// ===== 検索 =====
document.getElementById('search-input').addEventListener('input', renderList);

// ===== FAB =====
document.getElementById('fab-btn').addEventListener('click', () => {
  const card = document.getElementById('add-card');
  card.classList.toggle('mobile-open');
  if (card.classList.contains('mobile-open')) {
    card.scrollIntoView({ behavior: 'smooth' });
    setTimeout(() => document.getElementById('new-title').focus(), 200);

});

// ===== タイマー =====
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.35, 0.7].forEach(delay => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = 880;
      g.gain.setValueAtTime(0.4, ctx.currentTime + delay);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.28);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.28);
    });
  } catch {}
}

function startTimer(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  timerTaskId = id;
  const minutes  = t.timerMinutes || parseInt(localStorage.getItem('defaultTimer')) || 25;
  const totalMs  = minutes * 60 * 1000;
  const endTime  = Date.now() + totalMs;
  localStorage.setItem('activeTimer', JSON.stringify({ id, endTime, totalMs }));

  const sName = subjectName(t.subjectId);
  const tag   = document.getElementById('timer-subject-tag');
  tag.textContent  = sName;
  tag.style.display = sName ? '' : 'none';
  document.getElementById('timer-task-label').textContent = t.title;
  document.getElementById('timer-counting').style.display = '';
  document.getElementById('timer-done').style.display     = 'none';
  document.getElementById('timer-screen').classList.remove('hidden');

  runCountdown(endTime, totalMs);
}

function runCountdown(endTime, totalMs) {
  if (timerInterval) clearInterval(timerInterval);
  const CIRC = 628;

  function tick() {
    const rem  = Math.max(0, endTime - Date.now());
    const mins = Math.floor(rem / 60000);
    const secs = Math.floor((rem % 60000) / 1000);
    document.getElementById('timer-digits').textContent =
      `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    document.getElementById('c-fill').style.strokeDashoffset = CIRC * (1 - rem / totalMs);

    if (rem === 0) { clearInterval(timerInterval); timerInterval = null; onTimerEnd(); }
  }
  tick();
  timerInterval = setInterval(tick, 500);
}

async function onTimerEnd() {
  playBeep();
  localStorage.removeItem('activeTimer');
  const t = todos.find(t => t.id === timerTaskId);
  if (t && !isDoneToday(t)) {
    try {
      await updateDoc(doc(db, 'todos', timerTaskId), {
        completedDates: arrayUnion(today()), done: true
      });
    } catch (e) { console.error(e); }
  }
  document.getElementById('done-sub').textContent = t ? `「${t.title}」を完了しました！` : '集中お疲れさま！';
  document.getElementById('timer-counting').style.display = 'none';
  document.getElementById('timer-done').style.display     = '';
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  localStorage.removeItem('activeTimer');
  timerTaskId = null;
  document.getElementById('timer-screen').classList.add('hidden');
}

document.getElementById('timer-stop').addEventListener('click', stopTimer);
document.getElementById('timer-close').addEventListener('click', stopTimer);
document.getElementById('timer-back').addEventListener('click', () => {
  timerTaskId = null;
  document.getElementById('timer-screen').classList.add('hidden');
});

// ページロード時にタイマーを復元
const saved = localStorage.getItem('activeTimer');
if (saved) {
  try {
    const { id, endTime, totalMs } = JSON.parse(saved);
    if (Date.now() < endTime) {
      timerTaskId = id;
      const wait = setInterval(() => {
        const t = todos.find(t => t.id === id);
        if (t !== undefined) {
          clearInterval(wait);
          const sName = subjectName(t?.subjectId);
          const tag = document.getElementById('timer-subject-tag');
          tag.textContent = sName; tag.style.display = sName ? '' : 'none';
          document.getElementById('timer-task-label').textContent = t?.title || '';
          document.getElementById('timer-counting').style.display = '';
          document.getElementById('timer-done').style.display     = 'none';
          document.getElementById('timer-screen').classList.remove('hidden');
          runCountdown(endTime, totalMs);
        }
      }, 300);
    } else { localStorage.removeItem('activeTimer'); }
  } catch { localStorage.removeItem('activeTimer'); }
}

const defTimer = localStorage.getItem('defaultTimer');
if (defTimer) document.getElementById('new-timer').value = defTimer;
